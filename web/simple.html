<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>42 Art NFT Minter</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .mint-section {
            margin: 30px 0;
        }
        
        .mint-button {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .beautiful-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .beautiful-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .bonus-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .bonus-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.3);
        }
        
        .description {
            margin: 10px 0;
            color: #666;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .status {
            margin-top: 30px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .contract-info {
            margin-top: 30px;
            font-size: 0.8em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>42 Art NFT</h1>
        <p class="subtitle">Choose your NFT type</p>
        
        <div class="mint-section">
            <button class="mint-button beautiful-btn" onclick="mintBeautiful()">
                🎨 Mint Beautiful SVG
            </button>
            <p class="description">High-quality artistic SVG stored on IPFS cloud</p>
            
            <button class="mint-button bonus-btn" onclick="mintBonus()">
                ⛓️ Mint Bonus SVG
            </button>
            <p class="description">Simple onchain SVG stored directly on blockchain</p>
        </div>
        
        <div id="status" class="status"></div>
        
        <div class="contract-info">
            <p>Contract: <span id="contractAddress">Not connected</span></p>
            <p>Network: <span id="networkName">-</span></p>
        </div>
    </div>

    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <script>
        // Contract configuration
        const CONTRACT_ADDRESS = "0xFcE8134d569F41Fb05b52A081B9197840148caaf"; // Update after deployment
        const CONTRACT_ABI = [
            "function mintBeautiful(address to) external",
            "function mintBonus(address to) external",
            "function totalSupply() external view returns (uint256)",
            "function isBeautifulNFT(uint256) external view returns (bool)"
        ];
        
        let provider;
        let signer;
        let contract;
        
        // Initialize on page load
        window.addEventListener('load', async () => {
            if (typeof window.ethereum !== 'undefined') {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await connectWallet();
            } else {
                showStatus('Please install MetaMask!', 'error');
            }
        });
        
        async function connectWallet() {
            try {
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                
                const network = await provider.getNetwork();
                const address = await signer.getAddress();
                
                document.getElementById('contractAddress').textContent = CONTRACT_ADDRESS;
                document.getElementById('networkName').textContent = network.name;
                
                showStatus(`Connected: ${address}`, 'success');
            } catch (error) {
                showStatus('Failed to connect wallet', 'error');
            }
        }
        
        async function mintBeautiful() {
            if (!contract) {
                showStatus('Please connect your wallet first', 'error');
                return;
            }
            
            try {
                showStatus('Minting beautiful NFT...', 'info');
                const address = await signer.getAddress();
                const tx = await contract.mintBeautiful(address);
                
                showStatus('Transaction sent! Waiting for confirmation...', 'info');
                await tx.wait();
                
                showStatus('Beautiful NFT minted successfully! 🎨', 'success');
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        async function mintBonus() {
            if (!contract) {
                showStatus('Please connect your wallet first', 'error');
                return;
            }
            
            try {
                showStatus('Minting bonus NFT...', 'info');
                const address = await signer.getAddress();
                const tx = await contract.mintBonus(address);
                
                showStatus('Transaction sent! Waiting for confirmation...', 'info');
                await tx.wait();
                
                showStatus('Bonus NFT minted successfully! ⛓️', 'success');
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
