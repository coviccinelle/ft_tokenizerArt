<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>42 Art NFT - Mint Your Random Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .info-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        
        .info-item:last-child {
            margin-bottom: 0;
        }
        
        .label {
            font-weight: bold;
            color: #555;
        }
        
        .value {
            color: #333;
        }
        
        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            min-width: 150px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .preview {
            margin: 20px 0;
            text-align: center;
        }
        
        .design-preview {
            width: 200px;
            height: 200px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 0 auto;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .nft-link {
            margin-top: 15px;
        }
        
        .nft-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        
        .nft-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>42 Art NFT</h1>
        <p class="subtitle">Mint your random on-chain generative art</p>
        
        <div class="info-box">
            <div class="info-item">
                <span class="label">Price:</span>
                <span class="value">0.001 ETH</span>
            </div>
            <div class="info-item">
                <span class="label">Supply:</span>
                <span class="value" id="supply">Loading...</span>
            </div>
            <div class="info-item">
                <span class="label">Network:</span>
                <span class="value">BSC Testnet</span>
            </div>
            <div class="info-item">
                <span class="label">Type:</span>
                <span class="value">Fully On-Chain</span>
            </div>
        </div>
        
        <div class="preview">
            <div class="design-preview" id="preview">
                Random Design Preview
            </div>
        </div>
        
        <button id="connectWallet">Connect Wallet</button>
        <button id="mintButton" style="display: none;" disabled>Mint NFT</button>
        
        <div id="status"></div>
        
        <div id="nftResult" class="nft-link" style="display: none;"></div>
    </div>

    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <script>
        // Contract configuration
        const CONTRACT_ADDRESS = "0x..."; // Will be set after deployment
        const MINT_PRICE = "0.001";
        
        const CONTRACT_ABI = [
            "function mint() external payable",
            "function totalSupply() external view returns (uint256)",
            "function MAX_SUPPLY() external view returns (uint256)",
            "function MINT_PRICE() external view returns (uint256)",
            "function tokenURI(uint256 tokenId) external view returns (string)",
            "event Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
        ];
        
        let provider;
        let signer;
        let contract;
        let userAddress;
        
        // Sample SVG designs for preview
        const sampleDesigns = [
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="#1a1a2e"/><text x="100" y="120" text-anchor="middle" font-family="Arial" font-size="40" fill="#16213e" font-weight="bold">42</text></svg>',
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="#2ecc71"/><circle cx="100" cy="100" r="60" fill="#27ae60"/><text x="100" y="110" text-anchor="middle" font-family="Arial" font-size="35" fill="white">42</text></svg>',
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect width="200" height="200" fill="#e74c3c"/><rect x="75" y="75" width="50" height="50" fill="#c0392b"/><text x="100" y="110" text-anchor="middle" font-family="Arial" font-size="30" fill="white">42</text></svg>'
        ];
        
        async function connectWallet() {
            try {
                if (typeof window.ethereum !== 'undefined') {
                    provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    signer = provider.getSigner();
                    userAddress = await signer.getAddress();
                    
                    // Check if on BSC Testnet
                    const network = await provider.getNetwork();
                    if (network.chainId !== 97) {
                        showStatus("Please switch to BSC Testnet", "error");
                        return;
                    }
                    
                    contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
                    
                    document.getElementById("connectWallet").style.display = "none";
                    document.getElementById("mintButton").style.display = "inline-block";
                    document.getElementById("mintButton").disabled = false;
                    
                    showStatus(`Connected: ${userAddress.substring(0, 6)}...${userAddress.substring(38)}`, "success");
                    
                    await updateSupply();
                    showRandomPreview();
                } else {
                    showStatus("Please install MetaMask", "error");
                }
            } catch (error) {
                showStatus("Failed to connect wallet: " + error.message, "error");
            }
        }
        
        async function mintNFT() {
            try {
                document.getElementById("mintButton").disabled = true;
                showStatus("Minting NFT... Please confirm transaction", "info");
                
                const tx = await contract.mint({
                    value: ethers.utils.parseEther(MINT_PRICE)
                });
                
                showStatus("Transaction sent! Waiting for confirmation...", "info");
                
                const receipt = await tx.wait();
                
                // Get token ID from events
                const transferEvent = receipt.events.find(e => e.event === 'Transfer');
                const tokenId = transferEvent.args.tokenId.toString();
                
                showStatus("🎉 NFT Minted Successfully!", "success");
                
                // Show NFT result
                const resultDiv = document.getElementById("nftResult");
                resultDiv.innerHTML = `
                    <p>Your NFT #${tokenId} has been minted!</p>
                    <a href="https://testnet.bscscan.com/tx/${tx.hash}" target="_blank">View Transaction</a>
                `;
                resultDiv.style.display = "block";
                
                await updateSupply();
                showRandomPreview();
                
            } catch (error) {
                showStatus("Minting failed: " + error.message, "error");
            } finally {
                document.getElementById("mintButton").disabled = false;
            }
        }
        
        async function updateSupply() {
            try {
                const totalSupply = await contract.totalSupply();
                const maxSupply = await contract.MAX_SUPPLY();
                document.getElementById("supply").textContent = `${totalSupply}/${maxSupply}`;
            } catch (error) {
                console.error("Failed to update supply:", error);
            }
        }
        
        function showRandomPreview() {
            const randomIndex = Math.floor(Math.random() * sampleDesigns.length);
            const preview = document.getElementById("preview");
            preview.innerHTML = sampleDesigns[randomIndex];
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById("status");
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }
        
        // Event listeners
        document.getElementById("connectWallet").addEventListener("click", connectWallet);
        document.getElementById("mintButton").addEventListener("click", mintNFT);
        
        // Show initial random preview
        showRandomPreview();
        
        // Auto-rotate preview every 3 seconds
        setInterval(showRandomPreview, 3000);
    </script>
</body>
</html>
