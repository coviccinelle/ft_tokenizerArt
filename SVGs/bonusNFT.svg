<!-- Example SVG file for your "42" NFT -->
<svg width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bgGradient)"/>
  
  <!-- Main "42" text -->
  <text x="500" y="550" 
        font-family="Arial, sans-serif" 
        font-size="400" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="url(#textGradient)"
        stroke="#fff" 
        stroke-width="8">42</text>
  
  <!-- Subtitle -->
  <text x="500" y="750" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        text-anchor="middle" 
        fill="#ffffff">Token Art by thi-phng</text>
  
  <!-- School badge -->
  <circle cx="150" cy="150" r="80" fill="#ffffff" fill-opacity="0.2"/>
  <text x="150" y="165" 
        font-family="Arial, sans-serif" 
        font-size="32" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="#ffffff">42 School</text>
  
  <!-- Decorative elements -->
  <circle cx="850" cy="850" r="60" fill="#ffffff" fill-opacity="0.1"/>
  <circle cx="850" cy="150" r="40" fill="#ffffff" fill-opacity="0.1"/>
  <circle cx="150" cy="850" r="50" fill="#ffffff" fill-opacity="0.1"/>
</svg>
